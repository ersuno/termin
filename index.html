<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movedirect Umzugsliste</title>
    
    <!-- Import Font for Logo -->
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">

    <style>
        /* --- CSS Styles --- */
        
        :root {
            /* Branding Colors based on your image */
            --brand-purple: #8e2de2; 
            --brand-gradient: linear-gradient(135deg, #9b30b0 0%, #6e2590 100%);
            
            --bg-dark: #121212;
            --card-bg: #1e1e24;
            --input-bg: #2b2b36;
            --input-text: #ffffff;
            --text-label: #b0b0b0;
            --border-color: #3a3a45;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            /* Subtle background pattern */
            background-image: linear-gradient(rgba(18, 18, 18, 0.9), rgba(18, 18, 18, 0.9)), 
                              url('https://www.transparenttextures.com/patterns/dark-matter.png');
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 900px; 
            border: 1px solid var(--border-color);
            overflow: hidden; /* Clips the header */
        }

        /* --- Branding Header --- */
        .brand-header {
            background: var(--brand-gradient);
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .brand-logo {
            font-family: 'Varela Round', sans-serif;
            color: white;
            font-size: 3rem;
            letter-spacing: -1px;
            text-decoration: none;
            display: inline-block;
        }
        
        /* Mimic the logo icon above the 'v' or just simple text */
        .brand-logo span {
            font-weight: normal;
        }

        form {
            padding: 0 2.5rem 2.5rem 2.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.6rem;
            color: var(--text-label);
            font-size: 0.9rem;
            font-weight: 600;
        }

        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--input-text);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            appearance: none;
        }
        
        /* Custom Arrow for Selects */
        .select-wrapper {
            position: relative;
        }
        .select-wrapper::after {
            content: '▼';
            font-size: 0.7rem;
            color: var(--text-label);
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #9b30b0;
            background-color: #32323e;
            box-shadow: 0 0 0 4px rgba(155, 48, 176, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }

        textarea.address-box {
            min-height: 70px;
            height: 90px;
        }

        /* Two Column Layout */
        .split-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 30px;
            border-top: 2px solid var(--border-color);
            border-bottom: 2px solid var(--border-color);
            padding: 30px 0;
        }

        .column-header {
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #bd68d4; /* Lighter purple for headers */
            margin-bottom: 20px;
            font-weight: 800;
            font-size: 1.1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        /* Flex row for Aufzug fields */
        .multi-input-row {
            display: flex;
            gap: 15px;
        }
        .multi-input-row .select-wrapper {
            flex: 1;
        }
        
        button {
            width: 100%;
            padding: 16px;
            margin-top: 15px;
            background: var(--brand-gradient);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(155, 48, 176, 0.4);
        }

        @media (max-width: 768px) {
            .split-container {
                grid-template-columns: 1fr;
                gap: 40px;
            }
            .brand-logo {
                font-size: 2.5rem;
            }
            form {
                padding: 0 1.5rem 1.5rem 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Branding Header -->
        <div class="brand-header">
            <div class="brand-logo">movedirect</div>
        </div>

        <form id="moveForm">
            <!-- Customer Name -->
            <div class="form-group">
                <label for="customerName">Name Kunde</label>
                <input type="text" id="customerName" placeholder="Vorname Nachname" required>
            </div>

            <!-- Art / Grund -->
            <div class="form-group">
                <label for="moveReason">Art / Grund</label>
                <div class="select-wrapper">
                    <select id="moveReason">
                        <option value="Umzugsgut" selected>Umzugsgut</option>
                        <option value="Warenausfuhr">Warenausfuhr</option>
                        <option value="Ferienhaus">Ferienhaus</option>
                        <option value="Erbschaft">Erbschaft</option>
                        <option value="Sonstiges">Sonstiges</option>
                    </select>
                </div>
            </div>

            <!-- Split Section -->
            <div class="split-container">
                
                <!-- Left: AUSZUG -->
                <div class="column">
                    <div class="column-header">Auszug</div>

                    <!-- NEU: Objekttyp Auszug -->
                    <div class="form-group">
                        <label>Objekttyp</label>
                        <div class="select-wrapper">
                            <select id="az_objekt">
                                <option value="Wohnung" selected>Wohnung</option>
                                <option value="Haus">Haus</option>
                                <option value="Lager">Lager</option>
                                <option value="Büro">Büro</option>
                                <option value="Garage">Garage</option>
                                <option value="Zweifamilienhaus">Zweifamilienhaus</option>
                                <option value="Reihenhaus">Reihenhaus</option>
                                <option value="WG-Zimmer">WG-Zimmer</option>
                                <option value="Maisonette">Maisonette</option>
                                <option value="Sonstiges">Sonstiges</option>
                            </select>
                        </div>
                    </div>

                    <!-- Stockwerk (0-10) -->
                    <div class="form-group">
                        <label>Stockwerk</label>
                        <div class="select-wrapper">
                            <select id="az_stockwerk">
                                <option value="" disabled selected>Bitte wählen</option>
                                <script>
                                    for(let i=0; i<=10; i++) document.write(`<option value="${i}">${i}. Etage</option>`);
                                </script>
                            </select>
                        </div>
                    </div>

                    <!-- Trageweg (Ranges) -->
                    <div class="form-group">
                        <label>Trageweg</label>
                        <div class="select-wrapper">
                            <select id="az_trageweg">
                                <option value="0-10 m">0-10 m</option>
                                <option value="10-20 m">10-20 m</option>
                                <option value="20-30 m">20-30 m</option>
                                <option value="30-40 m">30-40 m</option>
                                <option value="40-50 m">40-50 m</option>
                                <option value="50-60 m">50-60 m</option>
                                <option value="60-70 m">60-70 m</option>
                                <option value="70-80 m">70-80 m</option>
                                <option value="80-90 m">80-90 m</option>
                                <option value="90-100 m">90-100 m</option>
                            </select>
                        </div>
                    </div>

                    <!-- Aufzug (Yes/No + 0-10) -->
                    <div class="form-group">
                        <label>Aufzug (Vorhanden? | Personen)</label>
                        <div class="multi-input-row">
                            <div class="select-wrapper">
                                <select id="az_aufzug_yn">
                                    <option value="Nein">Nein</option>
                                    <option value="Ja">Ja</option>
                                </select>
                            </div>
                            <div class="select-wrapper">
                                <select id="az_aufzug_cap">
                                    <option value="" disabled selected>0-10</option>
                                    <script>for(let i=0; i<=10; i++) document.write(`<option value="${i}">${i}</option>`);</script>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Halteverbotszone -->
                    <div class="form-group">
                        <label>Halteverbotszone</label>
                        <div class="select-wrapper">
                            <select id="az_hvz">
                                <option value="Nein">Nein</option>
                                <option value="Ja">Ja</option>
                                <option value="Durch den Kunden">Durch den Kunden</option>
                            </select>
                        </div>
                    </div>

                    <!-- Aussenlift -->
                    <div class="form-group">
                        <label>Aussenlift</label>
                        <div class="select-wrapper">
                            <select id="az_aussenlift">
                                <option value="Nein">Nein</option>
                                <option value="Ja">Ja</option>
                            </select>
                        </div>
                    </div>

                    <!-- Adresse (Resizable) -->
                    <div class="form-group">
                        <label>Adresse</label>
                        <textarea id="az_adresse" class="address-box" placeholder="Straße, Nr, PLZ, Ort"></textarea>
                    </div>
                </div>

                <!-- Right: EINZUG -->
                <div class="column">
                    <div class="column-header">Einzug</div>

                    <!-- NEU: Objekttyp Einzug -->
                    <div class="form-group">
                        <label>Objekttyp</label>
                        <div class="select-wrapper">
                            <select id="ez_objekt">
                                <option value="Wohnung" selected>Wohnung</option>
                                <option value="Haus">Haus</option>
                                <option value="Lager">Lager</option>
                                <option value="Büro">Büro</option>
                                <option value="Garage">Garage</option>
                                <option value="Zweifamilienhaus">Zweifamilienhaus</option>
                                <option value="Reihenhaus">Reihenhaus</option>
                                <option value="WG-Zimmer">WG-Zimmer</option>
                                <option value="Maisonette">Maisonette</option>
                                <option value="Sonstiges">Sonstiges</option>
                            </select>
                        </div>
                    </div>

                    <!-- Stockwerk (0-10) -->
                    <div class="form-group">
                        <label>Stockwerk</label>
                        <div class="select-wrapper">
                            <select id="ez_stockwerk">
                                <option value="" disabled selected>Bitte wählen</option>
                                <script>
                                    for(let i=0; i<=10; i++) document.write(`<option value="${i}">${i}. Etage</option>`);
                                </script>
                            </select>
                        </div>
                    </div>

                    <!-- Trageweg (Ranges) -->
                    <div class="form-group">
                        <label>Trageweg</label>
                        <div class="select-wrapper">
                            <select id="ez_trageweg">
                                <option value="0-10 m">0-10 m</option>
                                <option value="10-20 m">10-20 m</option>
                                <option value="20-30 m">20-30 m</option>
                                <option value="30-40 m">30-40 m</option>
                                <option value="40-50 m">40-50 m</option>
                                <option value="50-60 m">50-60 m</option>
                                <option value="60-70 m">60-70 m</option>
                                <option value="70-80 m">70-80 m</option>
                                <option value="80-90 m">80-90 m</option>
                                <option value="90-100 m">90-100 m</option>
                            </select>
                        </div>
                    </div>

                    <!-- Aufzug (Yes/No + 0-10) -->
                    <div class="form-group">
                        <label>Aufzug (Vorhanden? | Personen)</label>
                        <div class="multi-input-row">
                            <div class="select-wrapper">
                                <select id="ez_aufzug_yn">
                                    <option value="Nein">Nein</option>
                                    <option value="Ja">Ja</option>
                                </select>
                            </div>
                            <div class="select-wrapper">
                                <select id="ez_aufzug_cap">
                                    <option value="" disabled selected>0-10</option>
                                    <script>for(let i=0; i<=10; i++) document.write(`<option value="${i}">${i}</option>`);</script>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Halteverbotszone -->
                    <div class="form-group">
                        <label>Halteverbotszone</label>
                        <div class="select-wrapper">
                            <select id="ez_hvz">
                                <option value="Nein">Nein</option>
                                <option value="Ja">Ja</option>
                                <option value="Durch den Kunden">Durch den Kunden</option>
                            </select>
                        </div>
                    </div>

                    <!-- Aussenlift -->
                    <div class="form-group">
                        <label>Aussenlift</label>
                        <div class="select-wrapper">
                            <select id="ez_aussenlift">
                                <option value="Nein">Nein</option>
                                <option value="Ja">Ja</option>
                            </select>
                        </div>
                    </div>

                    <!-- Adresse (Resizable) -->
                    <div class="form-group">
                        <label>Adresse</label>
                        <textarea id="ez_adresse" class="address-box" placeholder="Straße, Nr, PLZ, Ort"></textarea>
                    </div>
                </div>
            </div>

            <!-- Inventar -->
            <div class="form-group">
                <label for="inventar">Inventar</label>
                <textarea id="inventar" placeholder="Liste der Möbelstücke..."></textarea>
            </div>

            <!-- Description -->
            <div class="form-group">
                <label for="description">Beschreibung</label>
                <textarea id="description" placeholder="Weitere Details zum Umzug, Besonderheiten..."></textarea>
            </div>

            <!-- Interne Notiz -->
            <div class="form-group">
                <label for="internalNote">Interne Notiz</label>
                <textarea id="internalNote" placeholder="Interne Bemerkungen, Preise, Team-Infos..."></textarea>
            </div>

            <!-- Organisationsvorschlag -->
            <div class="form-group">
                <label for="orgProposal">Organisationsvorschlag</label>
                <textarea id="orgProposal" placeholder="Vorschlag zur Organisation des Umzugs..."></textarea>
            </div>

            <!-- Service -->
            <div class="form-group">
                <label for="serviceInfo">Service</label>
                <textarea id="serviceInfo" placeholder="Zusatzleistungen, Verpackungsservice etc..."></textarea>
            </div>

            <!-- Download Button -->
            <button type="submit" id="downloadBtn">
                Download .txt 
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 15V3M12 15L8 11M12 15L16 11M2 17L2.62 19.48C2.84 20.36 3.06 20.8 3.52 21.15C3.98 21.5 4.54 21.5 5.66 21.5H18.34C19.46 21.5 20.02 21.5 20.48 21.15C20.94 20.8 21.16 20.36 21.38 19.48L22 17" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </form>
    </div>

    <script>
        document.getElementById('moveForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Helper to get value securely
            const getVal = (id) => {
                const el = document.getElementById(id);
                return el ? el.value : '-';
            };

            // 1. Gather Data
            const customer = document.getElementById('customerName').value;
            const reason = document.getElementById('moveReason').value;
            const inventar = document.getElementById('inventar').value;
            const desc = document.getElementById('description').value;
            const internal = document.getElementById('internalNote').value;
            const orgProposal = document.getElementById('orgProposal').value;
            const serviceInfo = document.getElementById('serviceInfo').value;

            // Auszug Data
            const az_obj = getVal('az_objekt');
            const az_st = getVal('az_stockwerk');
            const az_tw = getVal('az_trageweg');
            const az_auf_yn = getVal('az_aufzug_yn');
            const az_auf_cap = getVal('az_aufzug_cap');
            const az_hvz = getVal('az_hvz');
            const az_al = getVal('az_aussenlift');
            const az_adr = getVal('az_adresse');

            // Einzug Data
            const ez_obj = getVal('ez_objekt');
            const ez_st = getVal('ez_stockwerk');
            const ez_tw = getVal('ez_trageweg');
            const ez_auf_yn = getVal('ez_aufzug_yn');
            const ez_auf_cap = getVal('ez_aufzug_cap');
            const ez_hvz = getVal('ez_hvz');
            const ez_al = getVal('ez_aussenlift');
            const ez_adr = getVal('ez_adresse');

            // 2. Format Text File
            const textContent = 
`KUNDE: ${customer}
ART:   ${reason}
==========================================
AUSZUG (Start)
==========================================
Objekttyp:        ${az_obj}
Adresse:          ${az_adr}
Stockwerk:        ${az_st}. Etage
Trageweg:         ${az_tw}
Aufzug:           ${az_auf_yn} (Personen/Kapazität: ${az_auf_cap})
Halteverbotszone: ${az_hvz}
Aussenlift:       ${az_al}

==========================================
EINZUG (Ziel)
==========================================
Objekttyp:        ${ez_obj}
Adresse:          ${ez_adr}
Stockwerk:        ${ez_st}. Etage
Trageweg:         ${ez_tw}
Aufzug:           ${ez_auf_yn} (Personen/Kapazität: ${ez_auf_cap})
Halteverbotszone: ${ez_hvz}
Aussenlift:       ${ez_al}

==========================================
INVENTAR
==========================================
${inventar}

==========================================
BESCHREIBUNG
==========================================
${desc}

==========================================
INTERNE NOTIZ
==========================================
${internal}

==========================================
ORGANISATIONSVORSCHLAG
==========================================
${orgProposal}

==========================================
SERVICE
==========================================
${serviceInfo}
`;

            // 3. Create and Download File
            const blob = new Blob([textContent], { type: 'text/plain;charset=utf-8' });
            const safeName = (customer.trim().replace(/[^a-z0-9äöüß]/gi, '_') || 'umzug') + '.txt';

            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', safeName);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
